<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisuMark Agent</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar" aria-label="侧边栏">
            <div class="sidebar-header">
                <h1 class="logo">VisuMark Agent</h1>
                <span class="badge">VLM + SoM</span>
            </div>
            <div class="sidebar-body">
                <button class="btn-new-task" id="btn-new-task" title="开始一个新任务">+ 新任务</button>
                <div class="history-list" id="history-list">
                    <p class="hint">暂无历史记录</p>
                </div>
            </div>
            <div class="sidebar-footer">
                <span class="status-dot" id="status-dot" aria-label="连接状态"></span>
                <span id="status-text">就绪</span>
            </div>
        </aside>


        <!-- Main Chat Area -->
        <main class="main">
            <header class="chat-header">
                <button class="btn-toggle-sidebar" id="btn-toggle-sidebar" title="切换侧边栏" aria-label="切换侧边栏">☰</button>
                <h2>Agent 对话</h2>
            </header>

            <!-- Messages Container -->
            <div class="chat-messages" id="chat-messages">
                <!-- Welcome Screen -->
                <div class="welcome-message" id="welcome-message">
                    <div class="welcome-icon">🤖</div>
                    <h3>欢迎使用 VisuMark Agent</h3>
                    <p>在下方输入任务描述和目标网址，Agent 将使用视觉语言模型自动操控浏览器完成任务。</p>
                    <div class="welcome-examples">
                        <h4>示例任务</h4>
                        <button class="example-chip" data-task="中山大学广州校区南校园在哪里" data-url="https://www.bing.com">
                            🏫 中山大学南校园
                        </button>
                        <button class="example-chip" data-task="打开buff，查询精英之作的价格" data-url="https://www.bing.com">
                            🎮 Buff 精英之作
                        </button>
                        <button class="example-chip" data-task="登录QQ邮箱，给739862481@qq.com发送一封端午节祝福邮件，标题'端午安康'，正文简短的节日祝福即可" data-url="https://mail.qq.com">
                            📧 QQ邮箱发端午祝福
                        </button>
                        <button class="example-chip" data-task="今天天气怎么样" data-url="https://www.bing.com">
                            🌤️ 查询今天天气
                        </button>
                        <button class="example-chip" data-task="搜索从广州到北京的航班" data-url="https://www.bing.com">
                            ✈️ 广州到北京航班
                        </button>
                        <button class="example-chip" data-task="华南理工大学有哪些王牌专业" data-url="https://www.bing.com">
                            🏫 华工王牌专业
                        </button>
                        <button class="example-chip" data-task="打开淘宝搜索机械键盘并告诉我前三名的价格" data-url="https://www.bing.com">
                            🛒 淘宝搜索机械键盘
                        </button>
                        <button class="example-chip" data-task="2026年世界杯在哪个国家举办" data-url="https://www.bing.com">
                            ⚽ 2026世界杯举办地
                        </button>
                        <button class="example-chip" data-task="B站番剧排行榜第一名是什么" data-url="https://www.bing.com">
                            📺 B站番剧排行榜
                        </button>
                        <button class="example-chip" data-task="最新的特斯拉Model 3价格是多少" data-url="https://www.bing.com">
                            🚗 特斯拉Model 3价格
                        </button>
                        <button class="example-chip" data-task="帮我查一下深圳今天有什么演唱会" data-url="https://www.bing.com">
                            🎵 深圳今日演唱会
                        </button>
                        <button class="example-chip" data-task="Python和JavaScript哪个更适合初学者" data-url="https://www.bing.com">
                            💻 编程语言对比
                        </button>
                        <button class="example-chip" data-task="这个网页的标题和描述是什么" data-url="https://example.com">
                            📄 读取网页信息
                        </button>
                        <button class="example-chip" data-task="翻译 'Hello World' 到中文" data-url="https://fanyi.baidu.com">
                            🌐 百度翻译
                        </button>
                        <button class="example-chip" data-task="查询 serial 这个单词的含义" data-url="https://dict.cn">
                            📖 词典查词
                        </button>
                        <button class="example-chip" data-task="今天的NBA比赛结果是什么" data-url="https://www.baidu.com">
                            🏀 NBA比赛结果
                        </button>
                        <button class="example-chip" data-task="深圳到广州的高铁时刻表" data-url="https://www.baidu.com">
                            🚄 高铁时刻表
                        </button>
                        <button class="example-chip" data-task="豆瓣电影TOP250第一名是什么" data-url="https://www.baidu.com">
                            🎬 豆瓣电影TOP250
                        </button>
                        <button class="example-chip" data-task="查询人民币对美元的汇率" data-url="https://www.baidu.com">
                            💰 汇率查询
                        </button>
                        <button class="example-chip" data-task="打开百度翻译，把'人工智能正在改变世界'翻译成英文" data-url="https://fanyi.baidu.com">
                            🌐 翻译整句到英文
                        </button>
                        <button class="example-chip" data-task="查询今天黄金的实时价格（人民币/克）" data-url="https://www.baidu.com">
                            🥇 实时金价查询
                        </button>
                        <button class="example-chip" data-task="搜索从深圳北到广州南的高铁，告诉我最早一班的时间" data-url="https://www.baidu.com">
                            🚄 高铁最早班次
                        </button>
                        <button class="example-chip" data-task="本周末深圳天气怎么样？适合出门吗" data-url="https://www.bing.com">
                            🌦️ 周末天气+出行建议
                        </button>
                        <button class="example-chip" data-task="今天有什么热门新闻" data-url="https://www.baidu.com">
                            📰 今日热门新闻
                        </button>
                        <button class="example-chip" data-task="搜索'周杰伦'，找到他的出生日期和代表作前3首" data-url="https://www.baidu.com">
                            🎤 明星信息查询
                        </button>
                        <button class="example-chip" data-task="彭博社今天的头条新闻标题是什么" data-url="https://www.bloomberg.com">
                            📈 彭博社头条
                        </button>
                        <button class="example-chip" data-task="搜索南昌现在的天气，然后查一下南昌到广州的火车票，告诉我最早的一班是几点" data-url="https://www.bing.com">
                            🌤️🚄 天气+火车票组合查询
                        </button>
                        <button class="example-chip" data-task="分别搜索茅台和腾讯的最新股价，比较哪个涨幅更高" data-url="https://www.bing.com">
                            📊 股票对比查询
                        </button>
                        <button class="example-chip" data-task="搜索iPhone 16 Pro Max和三Samsung Galaxy S25 Ultra的详细参数，告诉我哪一个屏幕更大" data-url="https://www.bing.com">
                            📱 手机参数对比
                        </button>
                        <button class="example-chip" data-task="查询今天人民币对美元、欧元、日元三种货币的汇率" data-url="https://www.bing.com">
                            💱 多币种汇率查询
                        </button>
                        <button class="example-chip" data-task="搜索'阿尔伯特·爱因斯坦'，然后进入他的维基百科页面，告诉我他的出生地和逝世年份" data-url="https://www.bing.com">
                            🔬 维基百科信息提取
                        </button>
                        <button class="example-chip" data-task="在百度翻译中输入'I love programming'翻译成中文，再翻译成日文" data-url="https://fanyi.baidu.com">
                            🌐 多语种翻译
                        </button>
                        <button class="example-chip" data-task="搜索暗黑破坏神4，看看它在哪个平台可以玩，Metacritic评分是多少" data-url="https://www.bing.com">
                            🎮 游戏信息查询
                        </button>
                    </div>
                </div>

                <!-- Typing Indicator -->
                <div class="typing-indicator" id="typing-indicator">
                    <div class="bubble">
                        <span class="typing-dot"></span>
                        <span class="typing-dot"></span>
                        <span class="typing-dot"></span>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <div class="input-container">
                    <div class="input-row">
                        <textarea
                            id="task-input"
                            placeholder="描述你想要完成的任务，例如：搜索从北京到上海的航班..."
                            rows="2"
                            autofocus
                            aria-label="任务描述"
                        ></textarea>
                        <button class="btn-send" id="btn-send" title="执行任务 (Enter)" aria-label="发送">▶</button>
                    </div>
                    <div class="input-row-secondary">
                        <div class="url-input-wrapper">
                            <input
                                type="url"
                                id="url-input"
                                placeholder="目标网址 https://..."
                                value="https://example.com"
                                aria-label="目标网址"
                            />
                        </div>
                        <button class="btn-advanced" id="btn-advanced" title="高级设置" aria-label="高级设置">⚙</button>
                    </div>

                    <!-- Advanced Settings (collapsible) -->
                    <div class="advanced-settings hidden" id="advanced-settings">
                        <div class="advanced-settings-inner">
                            <div class="settings-grid">
                                <label>
                                    供应商
                                    <select id="setting-provider">
                                        <option value="qwen">通义千问 (DashScope API)</option>
                                        <option value="openai">OpenAI (GPT-4V/4o)</option>
                                        <option value="anthropic">Anthropic (Claude)</option>
                                        <option value="local">本地模型 (Ollama/vLLM)</option>
                                    </select>
                                </label>
                                <label>
                                    模型
                                    <input type="text" id="setting-model" value="qwen3-vl-8b-instruct" placeholder="qwen3-vl-8b-instruct" />
                                </label>
                                <label>
                                    API Key
                                    <input type="password" id="setting-api-key" placeholder="API Key（已配置则留空）" />
                                </label>
                                <label>
                                    API Base URL
                                    <input type="text" id="setting-base-url" placeholder="自动根据供应商填充" />
                                </label>
                                <label>
                                    最大步数
                                    <input type="number" id="setting-max-steps" value="30" min="1" max="50" />
                                </label>
                                <label>
                                    感知模式
                                    <select id="setting-mode">
                                        <option value="som">SoM 视觉模式（截图+标注框）</option>
                                        <option value="html">HTML 文本模式（纯文本候选项）</option>
                                    </select>
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" id="setting-headless" />
                                    无头模式（后台运行浏览器）
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Screenshot Lightbox -->
        <div class="lightbox hidden" id="lightbox" aria-label="截图查看器">
            <button class="lightbox-close" id="lightbox-close" aria-label="关闭">✕</button>
            <img id="lightbox-img" src="" alt="截图" />
        </div>

        <!-- Toast Notifications -->
        <div class="toast-container" id="toast-container"></div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
