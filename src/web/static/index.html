<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisuMark Agent</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app">
        <!-- ═══ Top Header Bar ═══ -->
        <header class="top-bar" id="top-bar">
            <div class="top-bar-left">
                <button class="btn-icon" id="btn-toggle-sidebar" title="历史记录" aria-label="切换侧边栏">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
                </button>
                <h1 class="logo">VisuMark<span class="logo-dim">Agent</span></h1>
            </div>
            <div class="top-bar-center">
                <span class="task-indicator" id="task-indicator" title="当前任务">就绪</span>
            </div>
            <div class="top-bar-right">
                <span class="status-pill" id="status-pill">
                    <span class="status-dot" id="status-dot"></span>
                    <span id="status-text">就绪</span>
                </span>
                <button class="btn-icon" id="btn-new-task" title="新任务" aria-label="新任务">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </button>
            </div>
        </header>

        <!-- ═══ Main Split Layout ═══ -->
        <div class="main-content">
            <!-- Left: Browser Viewport Panel -->
            <section class="browser-panel" id="browser-panel">
                <div class="browser-header">
                    <span class="browser-header-title">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/></svg>
                        浏览器画面
                    </span>
                    <span class="browser-header-url" id="browser-url"></span>
                </div>
                <div class="browser-viewport" id="browser-viewport">
                    <div class="browser-placeholder" id="browser-placeholder">
                        <div class="browser-placeholder-icon">
                            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity="0.3">
                                <rect x="2" y="3" width="20" height="14" rx="2"/>
                                <path d="M8 21h8"/>
                                <path d="M12 17v4"/>
                            </svg>
                        </div>
                        <p class="browser-placeholder-text">浏览器画面将在此显示</p>
                        <p class="browser-placeholder-sub">输入任务开始后将展示实时可交互的浏览器画面</p>
                    </div>
                    <div class="browser-stream-wrapper" id="browser-stream-wrapper" style="display:none">
                        <img class="browser-screenshot" id="browser-screenshot" src="" alt="浏览器实时画面" />
                        <div class="browser-input-overlay" id="browser-input-overlay"></div>
                    </div>
                </div>
                <div class="browser-footer">
                    <span class="browser-step-info" id="browser-step-info"></span>
                    <span class="browser-elem-count" id="browser-elem-count"></span>
                </div>
            </section>

            <!-- Right: Chat Panel -->
            <section class="chat-panel" id="chat-panel">
                <!-- Messages Container -->
                <div class="chat-messages" id="chat-messages">
                    <!-- Welcome Screen -->
                    <div class="welcome-message" id="welcome-message">
                        <div class="welcome-icon">
                            <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
                                <circle cx="12" cy="12" r="10"/>
                                <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
                                <line x1="9" y1="9" x2="9.01" y2="9"/>
                                <line x1="15" y1="9" x2="15.01" y2="9"/>
                            </svg>
                        </div>
                        <h3>欢迎使用 VisuMark Agent</h3>
                        <p>输入任务描述和目标网址，AI Agent 将自动操控浏览器完成任务。<br/>左侧面板将实时展示浏览器画面。</p>
                        <div class="welcome-examples">
                            <h4>示例任务</h4>
                            <button class="example-chip" data-task="中山大学广州校区南校园在哪里" data-url="https://www.bing.com">🏫 中山大学南校园</button>
                            <button class="example-chip" data-task="打开buff，查询精英之作的价格" data-url="https://www.bing.com">🎮 Buff 精英之作</button>
                            <button class="example-chip" data-task="登录QQ邮箱，给739862481@qq.com发送一封端午节祝福邮件，标题'端午安康'，正文简短的节日祝福即可" data-url="https://mail.qq.com">📧 QQ邮箱发端午祝福</button>
                            <button class="example-chip" data-task="今天天气怎么样" data-url="https://www.bing.com">🌤️ 查询今天天气</button>
                            <button class="example-chip" data-task="搜索从广州到北京的航班" data-url="https://www.bing.com">✈️ 广州到北京航班</button>
                            <button class="example-chip" data-task="华南理工大学有哪些王牌专业" data-url="https://www.bing.com">🏫 华工王牌专业</button>
                            <button class="example-chip" data-task="打开淘宝搜索机械键盘并告诉我前三名的价格" data-url="https://www.bing.com">🛒 淘宝搜索机械键盘</button>
                            <button class="example-chip" data-task="2026年世界杯在哪个国家举办" data-url="https://www.bing.com">⚽ 2026世界杯举办地</button>
                            <button class="example-chip" data-task="B站番剧排行榜第一名是什么" data-url="https://www.bing.com">📺 B站番剧排行榜</button>
                            <button class="example-chip" data-task="最新的特斯拉Model 3价格是多少" data-url="https://www.bing.com">🚗 特斯拉Model 3价格</button>
                            <button class="example-chip" data-task="帮我查一下深圳今天有什么演唱会" data-url="https://www.bing.com">🎵 深圳今日演唱会</button>
                            <button class="example-chip" data-task="Python和JavaScript哪个更适合初学者" data-url="https://www.bing.com">💻 编程语言对比</button>
                            <button class="example-chip" data-task="翻译 'Hello World' 到中文" data-url="https://fanyi.baidu.com">🌐 百度翻译</button>
                            <button class="example-chip" data-task="查询 serial 这个单词的含义" data-url="https://dict.cn">📖 词典查词</button>
                            <button class="example-chip" data-task="深圳到广州的高铁时刻表" data-url="https://www.baidu.com">🚄 高铁时刻表</button>
                            <button class="example-chip" data-task="豆瓣电影TOP250第一名是什么" data-url="https://www.baidu.com">🎬 豆瓣电影TOP250</button>
                            <button class="example-chip" data-task="搜索从深圳北到广州南的高铁，告诉我最早一班的时间" data-url="https://www.baidu.com">🚄 高铁最早班次</button>
                            <button class="example-chip" data-task="搜索'周杰伦'，找到他的出生日期和代表作前3首" data-url="https://www.baidu.com">🎤 明星信息查询</button>
                            <button class="example-chip" data-task="分别搜索茅台和腾讯的最新股价，比较哪个涨幅更高" data-url="https://www.bing.com">📊 股票对比查询</button>
                            <button class="example-chip" data-task="搜索iPhone 16 Pro Max和Samsung Galaxy S25 Ultra的详细参数，告诉我哪一个屏幕更大" data-url="https://www.bing.com">📱 手机参数对比</button>
                        </div>
                    </div>

                    <!-- Typing Indicator -->
                    <div class="typing-indicator" id="typing-indicator">
                        <div class="bubble">
                            <span class="typing-dot"></span>
                            <span class="typing-dot"></span>
                            <span class="typing-dot"></span>
                        </div>
                    </div>
                </div>

                <!-- Input Area -->
                <div class="input-area">
                    <div class="input-container">
                        <div class="input-row">
                            <textarea
                                id="task-input"
                                placeholder="描述你想要完成的任务，例如：搜索从北京到上海的航班..."
                                rows="2"
                                autofocus
                                aria-label="任务描述"
                            ></textarea>
                            <button class="btn-send" id="btn-send" title="执行任务 (Enter)" aria-label="发送">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                            </button>
                        </div>
                        <div class="input-row-secondary">
                            <div class="url-input-wrapper">
                                <svg class="url-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
                                <input
                                    type="url"
                                    id="url-input"
                                    placeholder="目标网址 https://..."
                                    value="https://example.com"
                                    aria-label="目标网址"
                                />
                            </div>
                            <button class="btn-advanced" id="btn-advanced" title="高级设置" aria-label="高级设置">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                            </button>
                        </div>

                        <!-- Advanced Settings (collapsible) -->
                        <div class="advanced-settings hidden" id="advanced-settings">
                            <div class="advanced-settings-inner">
                                <div class="settings-grid">
                                    <label>
                                        供应商
                                        <select id="setting-provider">
                                            <option value="qwen">通义千问 (DashScope API)</option>
                                            <option value="openai">OpenAI (GPT-4V/4o)</option>
                                            <option value="anthropic">Anthropic (Claude)</option>
                                            <option value="local">本地模型 (Ollama/vLLM)</option>
                                        </select>
                                    </label>
                                    <label>
                                        模型
                                        <input type="text" id="setting-model" value="qwen3-vl-8b-instruct" placeholder="qwen3-vl-8b-instruct" />
                                    </label>
                                    <label>
                                        API Key
                                        <input type="password" id="setting-api-key" placeholder="API Key（已配置则留空）" />
                                    </label>
                                    <label>
                                        API Base URL
                                        <input type="text" id="setting-base-url" placeholder="自动根据供应商填充" />
                                    </label>
                                    <label>
                                        最大步数
                                        <input type="number" id="setting-max-steps" value="30" min="1" max="50" />
                                    </label>
                                    <label>
                                        感知模式
                                        <select id="setting-mode">
                                            <option value="som">SoM 视觉模式（截图+标注框）</option>
                                            <option value="html">HTML 文本模式（纯文本候选项）</option>
                                        </select>
                                    </label>
                                    <label class="checkbox-label">
                                        <input type="checkbox" id="setting-headless" />
                                        无头模式（后台运行浏览器）
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <!-- ═══ Slide-over History Sidebar ═══ -->
        <div class="sidebar-overlay hidden" id="sidebar-overlay">
            <aside class="sidebar-panel" id="sidebar-panel">
                <div class="sidebar-panel-header">
                    <h3>历史记录</h3>
                    <button class="btn-icon" id="btn-close-sidebar" aria-label="关闭">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>
                <div class="history-list" id="history-list">
                    <p class="hint">暂无历史记录</p>
                </div>
            </aside>
        </div>

        <!-- ═══ Screenshot Lightbox ═══ -->
        <div class="lightbox hidden" id="lightbox" aria-label="截图查看器">
            <button class="lightbox-close" id="lightbox-close" aria-label="关闭">✕</button>
            <img id="lightbox-img" src="" alt="截图" />
        </div>

        <!-- ═══ Toast Notifications ═══ -->
        <div class="toast-container" id="toast-container"></div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
