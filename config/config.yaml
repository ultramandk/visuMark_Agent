# VisuMark Agent Configuration
# ============================================================================

agent:
  mode: som                     # "som" (primary: visual SoM + VLM) | "html" (auxiliary: text HTML + LLM)
  max_steps: 30
  retry_on_error: true
  max_retries: 3
  verify_actions: true          # Post-action verification: compare before/after screenshots
  max_verify_retries: 1         # Max retries when verification fails and suggests alternative

# ---------------------------------------------------------------------------
# Perception — how the agent "sees" the page
# ---------------------------------------------------------------------------
perception:
  som:
    max_elements: 200           # Max interactive elements to label
    font_size: 14               # SoM label font size
    border_color: "#FF0000"     # Default bounding box color
    border_width: 2
    show_labels: true
    use_accessibility_tree: true  # Fuse DOM + Accessibility Tree (WebGUM approach)
    min_element_size: 4         # Minimum pixel area to consider an element
  html:
    max_candidates: 50
    cleaning_preset: mind2web   # "mind2web" | "minimal" | "none"

# ---------------------------------------------------------------------------
# Reasoning — which VLM/LLM to use
# ---------------------------------------------------------------------------
reasoning:
  provider: qwen                # "openai" | "anthropic" | "qwen" | "local"
  model: qwen3-vl-8b-instruct
  api_key: "sk-af34b0af217c4deab60b8a5046dde2a0"
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  temperature: 0.0
  max_tokens: 4096
  timeout: 120
  max_retries: 3

# ---------------------------------------------------------------------------
# Environment — browser settings
# ---------------------------------------------------------------------------
environment:
  type: live                    # "live" (real browser) | "offline" (cached snapshots)
  headless: false
  viewport_width: 1280
  viewport_height: 720
  timeout: 30000                # ms per action

# ---------------------------------------------------------------------------
# Evaluation — Mind2Web benchmark settings
# ---------------------------------------------------------------------------
evaluation:
  splits:
    - test_cross_task
    - test_cross_website
    - test_cross_domain
  output_dir: ./data/results
  max_tasks_per_split: null     # null = all tasks; set a number for quick tests

# ---------------------------------------------------------------------------
# Data paths
# ---------------------------------------------------------------------------
data:
  mind2web_dir: ./data/mind2web
  screenshot_dir: ./data/screenshots
